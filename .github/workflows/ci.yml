name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_ESCROW_CONTRACT_ADDRESS: CA62WWTOFZQIYWXQHZUOAXF3ZB5IB3AS6N7RYYXGG4YK6M3NJ6OK2SQO
  NEXT_PUBLIC_TOKEN_CONTRACT_ADDRESS: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
  NEXT_PUBLIC_STELLAR_NETWORK: testnet
  NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org:443

jobs:
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check Rust Formatting
        run: cargo fmt --all -- --check

      - name: Run Contract Tests
        run: cargo test --workspace

  contract-wasm:
    name: Contract WASM Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cargo Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build Contracts
        run: cargo build --workspace --target wasm32v1-none --release

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npx --yes npm@10.9.2 ci

      - name: Run Lint
        run: npm run lint

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npx --yes npm@10.9.2 ci

      - name: Run Unit Tests
        run: npm test

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npx --yes npm@10.9.2 ci

      - name: Check TypeScript
        run: npm run typecheck

  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npx --yes npm@10.9.2 ci

      - name: Build Static App
        run: npm run build

      - name: Verify Cloudflare Output
        run: test -f out/index.html
